    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // --- 图标组件 ---
        const IconBase = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>

        const Plus = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconBase>;
        const Edit3 = (props) => <IconBase {...props}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconBase>;
        const XCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></IconBase>;
        const Power = (props) => <IconBase {...props}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></IconBase>;
        const Tag = (props) => <IconBase {...props}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></IconBase>;
        const SearchIcon = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></IconBase>;
        const ChevronLeft = (props) => <IconBase {...props}><polyline points="15 18 9 12 15 6"></polyline></IconBase>;
        const ChevronRight = (props) => <IconBase {...props}><polyline points="9 18 15 12 9 6"></polyline></IconBase>;

        // --- 模拟初始数据 ---
        const INITIAL_DATA = [
            {
                id: 5,
                batchNo: '2023110501', 
                name: '双11预热草稿',
                amount: 200,
                validityType: 'fixed',
                validityStartDate: '2025-11-01',
                validityEndDate: '2025-11-11',
                validityDays: '',
                scenario: 'general',
                stackable: false,
                ruleType: 'threshold',
                thresholdAmount: 2000,
                status: 'draft', 
                createTime: Date.now() + 10000,
                updateTime: Date.now() + 10000,
                operator: '运营-小王',
                auditTime: null,
                auditor: '-',
                auditRemark: '',
                totalQuantity: 5000,
                claimedQuantity: 0,
                pendingStock: null
            },
            {
                id: 3,
                batchNo: '2023102588',
                name: '回归用户满减券',
                amount: 100,
                validityType: 'relative',
                validityDays: 15,
                scenario: 'reactivation',
                stackable: false,
                ruleType: 'threshold',
                thresholdAmount: 1000,
                status: 'auditing', 
                createTime: Date.now() - 500000,
                updateTime: Date.now() - 500000,
                operator: '运营-小王',
                auditTime: null,
                auditor: '-',
                auditRemark: '',
                totalQuantity: 2000,
                claimedQuantity: 0,
                pendingStock: null
            },
            {
                id: 1,
                batchNo: '2023061801',
                name: '六月年中大促新人券',
                amount: 50,
                validityType: 'relative',
                validityDays: 7,
                scenario: 'new_user',
                stackable: false,
                ruleType: 'threshold',
                thresholdAmount: 300,
                status: 'approved', 
                createTime: Date.now() - 10000000,
                updateTime: Date.now() - 9000000,
                operator: '运营-小王',
                auditTime: Date.now() - 9000000,
                auditor: '管理员-老李',
                auditRemark: '符合活动要求',
                totalQuantity: 1000,
                claimedQuantity: 450,
                pendingStock: null
            },
            {
                id: 2,
                batchNo: '2023052099',
                name: '社群活跃专属红包',
                amount: 5,
                validityType: 'relative',
                validityDays: 30,
                scenario: 'community',
                stackable: true,
                ruleType: 'none',
                thresholdAmount: 0,
                status: 'approved', 
                createTime: Date.now() - 12000000,
                updateTime: Date.now() - 11000000,
                operator: '运营-小张',
                auditTime: Date.now() - 11000000,
                auditor: '管理员-老李',
                auditRemark: '通过',
                totalQuantity: 500,
                claimedQuantity: 460, 
                pendingStock: 800
            },
            {
                id: 4,
                batchNo: '2023010155',
                name: '限时秒杀通用券',
                amount: 20,
                validityType: 'relative',
                validityDays: 7,
                scenario: 'general',
                stackable: true,
                ruleType: 'none',
                thresholdAmount: 0,
                status: 'approved', 
                createTime: Date.now() - 20000000,
                updateTime: Date.now() - 19000000,
                operator: '运营-小王',
                auditTime: Date.now() - 19000000,
                auditor: '管理员-老李',
                auditRemark: '',
                totalQuantity: 100,
                claimedQuantity: 100,
                pendingStock: null 
            },
            {
                id: 6,
                batchNo: '2023121200',
                name: '违规测试券',
                amount: 1000,
                validityType: 'fixed',
                validityStartDate: '2023-01-01',
                validityEndDate: '2025-12-31',
                validityDays: '',
                scenario: 'new_user',
                stackable: true,
                ruleType: 'none',
                thresholdAmount: 0,
                status: 'rejected', 
                createTime: Date.now() - 3000000,
                updateTime: Date.now() - 2000000,
                operator: '运营-实习生',
                auditTime: Date.now() - 2000000,
                auditor: '管理员-老李',
                auditRemark: '金额过大，有效期过长，不符合规范',
                totalQuantity: 10,
                claimedQuantity: 0,
                pendingStock: null
            },
            {
                id: 7,
                batchNo: '2022020222',
                name: '过期春节活动',
                amount: 88,
                validityType: 'relative',
                validityDays: 7,
                scenario: 'community',
                stackable: true,
                ruleType: 'none',
                thresholdAmount: 0,
                status: 'finished', 
                createTime: Date.now() - 50000000,
                updateTime: Date.now() - 40000000,
                operator: '运营-小王',
                auditTime: Date.now() - 45000000,
                auditor: '管理员-老李',
                auditRemark: '通过',
                totalQuantity: 1000,
                claimedQuantity: 888,
                pendingStock: null
            }
        ];

        // --- 选项配置 ---
        const SCENARIOS = [
            { value: 'community', label: '社群福利' },
            { value: 'new_user', label: '新用户福利' },
            { value: 'reactivation', label: '促活福利' },
            { value: 'general', label: '通用活动' },
        ];

        // --- 获取派生状态的方法 ---
        const getEffectiveStatus = (coupon) => {
            if (coupon.status === 'finished') return 'finished';
            // 只要是 approved 且领完了，在展示层被视为 finished_auto(已抢光)，但在底层仍是 approved
            if (coupon.status === 'approved' && (coupon.totalQuantity - coupon.claimedQuantity <= 0)) {
                return 'finished_auto';
            }
            return coupon.status;
        };

        // --- 主应用组件 ---
        const App = () => {
            const [coupons, setCoupons] = useState(INITIAL_DATA);
            const [modalMode, setModalMode] = useState(null); // 'create' | 'edit' | 'view'
            const [isAuditModalOpen, setIsAuditModalOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [auditData, setAuditData] = useState({ id: null, passed: true, remark: '' });

            // 搜索、筛选、分页状态
            const [searchText, setSearchText] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterScenario, setFilterScenario] = useState('all');
            const [currentPage, setCurrentPage] = useState(1);
            const pageSize = 5;

            // 生成10位不重复随机批次号
            const generateBatchNo = (currentCoupons) => {
                let batchNo;
                let isDuplicate = true;
                while (isDuplicate) {
                    batchNo = Math.floor(1000000000 + Math.random() * 9000000000).toString();
                    isDuplicate = currentCoupons.some(c => c.batchNo === batchNo);
                }
                return batchNo;
            };

            // 打开新增/编辑/查看弹窗
            const openModal = (mode, coupon = null) => {
                setModalMode(mode);
                if (coupon) {
                    setFormData({ ...coupon });
                } else {
                    setFormData({
                        id: null,
                        name: '',
                        amount: '',
                        validityType: 'relative', 
                        validityDays: '',
                        validityStartDate: '',
                        validityEndDate: '',
                        scenario: 'community',
                        stackable: false,
                        ruleType: 'none',
                        thresholdAmount: '',
                        status: 'draft',
                        createTime: Date.now(),
                        auditRemark: '',
                        totalQuantity: '', 
                        claimedQuantity: 0,
                        pendingStock: null
                    });
                }
            };

            // 关闭弹窗
            const closeModal = () => setModalMode(null);

            // 打开审核弹窗
            const openAuditModal = (coupon) => {
                setAuditData({ id: coupon.id, passed: true, remark: '' });
                setIsAuditModalOpen(true);
            };

            // 保存优惠券（包含 防呆校验）
            const handleSave = (e) => {
                e.preventDefault();
                
                // 1. 满减防呆校验
                if (formData.ruleType === 'threshold' && Number(formData.thresholdAmount) <= Number(formData.amount)) {
                    alert('满减门槛金额必须大于优惠券面额！');
                    return;
                }

                // 2. 有效期防呆校验
                if (formData.validityType === 'relative' && !formData.validityDays) {
                    alert('请输入有效天数');
                    return;
                }
                if (formData.validityType === 'fixed') {
                    if (!formData.validityStartDate || !formData.validityEndDate) {
                        alert('请选择完整的起止日期');
                        return;
                    }
                    const start = new Date(formData.validityStartDate);
                    const end = new Date(formData.validityEndDate);
                    start.setHours(0,0,0,0);
                    end.setHours(0,0,0,0);
                    
                    const today = new Date();
                    today.setHours(0,0,0,0);

                    if (end < start) {
                        alert('结束日期不能早于开始日期！');
                        return;
                    }
                    if (end < today) {
                        alert('结束日期不能早于今天（不能创建已过期的批次）！');
                        return;
                    }
                }

                // 3. 库存修改校验
                if (formData.id) {
                    const originalCoupon = coupons.find(c => c.id === formData.id);
                    if (originalCoupon && originalCoupon.status === 'approved') {
                        if (Number(formData.totalQuantity) < originalCoupon.totalQuantity) {
                            alert(`发放总量不能低于当前库存总数 (${originalCoupon.totalQuantity})`);
                            return;
                        }
                    }
                }

                const now = Date.now();
                const operator = '运营-小王'; 

                if (formData.id) {
                    // 编辑逻辑
                    setCoupons(prev => prev.map(c => {
                        if (c.id === formData.id) {
                            if (c.status === 'approved') {
                                if (Number(formData.totalQuantity) !== c.totalQuantity) {
                                    return {
                                        ...c,
                                        pendingStock: Number(formData.totalQuantity),
                                        updateTime: now,
                                        operator: operator
                                    };
                                }
                                return c; 
                            }
                            return { 
                                ...formData, 
                                status: 'draft',
                                updateTime: now,
                                operator: operator,
                                pendingStock: null 
                            };
                        }
                        return c;
                    }));
                } else {
                    // 新增逻辑
                    const newBatchNo = generateBatchNo(coupons);
                    const newCoupon = {
                        ...formData,
                        id: now,
                        batchNo: newBatchNo, 
                        createTime: now,
                        updateTime: now, 
                        operator: operator, 
                        auditTime: null,
                        auditor: '-',
                        status: 'draft',
                        claimedQuantity: 0,
                        pendingStock: null
                    };
                    setCoupons(prev => [newCoupon, ...prev]);
                }
                closeModal();
            };

            // 撤销修改库存申请
            const handleRevokeStock = (e) => {
                e.preventDefault();
                if (confirm('确认撤销该库存修改申请吗？撤销后将恢复原状。')) {
                    const now = Date.now();
                    setCoupons(prev => prev.map(c => c.id === formData.id ? { 
                        ...c, 
                        pendingStock: null,
                        updateTime: now,
                        operator: '运营-小王'
                    } : c));
                    closeModal();
                }
            };

            // 提交审核
            const handleSubmitAudit = (id) => {
                if (confirm('确认提交审核吗？提交后将无法编辑。')) {
                    updateStatus(id, 'auditing');
                }
            };

            // 撤回审核
            const handleRevokeAudit = (id) => {
                if (confirm('确认撤回该审核申请吗？撤回后将变回“待提交”状态。')) {
                    updateStatus(id, 'draft');
                }
            };

            // 执行审核
            const handleAuditAction = () => {
                const newStatus = auditData.passed ? 'approved' : 'rejected';
                const now = Date.now();
                
                setCoupons(prev => prev.map(c => {
                    if (c.id === auditData.id) {
                        if (c.pendingStock !== null) {
                            // 库存审核
                            if (auditData.passed) {
                                return {
                                    ...c,
                                    totalQuantity: c.pendingStock,
                                    pendingStock: null,
                                    auditTime: now,
                                    auditor: '管理员-老李',
                                    updateTime: now,
                                    auditRemark: auditData.remark
                                };
                            } else {
                                return {
                                    ...c,
                                    pendingStock: null,
                                    auditTime: now,
                                    auditor: '管理员-老李',
                                    updateTime: now,
                                    auditRemark: auditData.remark
                                };
                            }
                        } else {
                            // 新建审核
                            return { 
                                ...c, 
                                status: newStatus, 
                                auditRemark: auditData.remark,
                                auditTime: now, 
                                auditor: '管理员-老李', 
                                updateTime: now 
                            };
                        }
                    }
                    return c;
                }));
                setIsAuditModalOpen(false);
            };

            // 结束活动
            const handleFinish = (id) => {
                if (confirm('确认要结束该批次优惠券活动吗？结束后用户无法领取，前端将显示“活动已结束”。')) {
                    updateStatus(id, 'finished');
                }
            };

            // 删除
            const handleDelete = (id) => {
                if (confirm('确认删除该批次吗？')) {
                    setCoupons(prev => prev.filter(c => c.id !== id));
                }
            };

            // 快捷更新状态通用函数
            const updateStatus = (id, status) => {
                const now = Date.now();
                setCoupons(prev => prev.map(c => c.id === id ? { 
                    ...c, 
                    status,
                    updateTime: now, 
                    operator: '运营-小王'
                } : c));
            };

            // --- 过滤、排序与分页逻辑 ---
            const filteredAndSortedCoupons = useMemo(() => {
                let result = [...coupons];
                
                // 1. 文本搜索
                if (searchText.trim()) {
                    const text = searchText.toLowerCase();
                    result = result.filter(c => 
                        c.name.toLowerCase().includes(text) || 
                        (c.batchNo && c.batchNo.includes(text))
                    );
                }

                // 2. 状态筛选
                if (filterStatus !== 'all') {
                    result = result.filter(c => getEffectiveStatus(c) === filterStatus);
                }

                // 3. 场景筛选
                if (filterScenario !== 'all') {
                    result = result.filter(c => c.scenario === filterScenario);
                }

                // 4. 排序 (创建时间倒序)
                return result.sort((a, b) => b.createTime - a.createTime);
            }, [coupons, searchText, filterStatus, filterScenario]);

            // 计算分页
            const totalPages = Math.ceil(filteredAndSortedCoupons.length / pageSize) || 1;
            const currentData = filteredAndSortedCoupons.slice((currentPage - 1) * pageSize, currentPage * pageSize);

            // 当搜索或筛选变化时，重置回第一页
            useEffect(() => {
                setCurrentPage(1);
            }, [searchText, filterStatus, filterScenario]);


            // 获取状态对应的样式和文字
            const getStatusBadge = (coupon) => {
                const status = getEffectiveStatus(coupon);
                const config = {
                    draft: { color: 'bg-gray-100 text-gray-700', text: '待提交', icon: <Edit3 size={14} /> },
                    auditing: { color: 'bg-yellow-100 text-yellow-700', text: '审核中', icon: <Clock size={14} /> },
                    approved: { color: 'bg-green-100 text-green-700', text: '已通过', icon: <CheckCircle size={14} /> },
                    rejected: { color: 'bg-red-100 text-red-700', text: '未通过', icon: <XCircle size={14} /> },
                    finished: { color: 'bg-slate-200 text-slate-500', text: '已结束', icon: <Power size={14} /> },
                    finished_auto: { color: 'bg-slate-200 text-slate-500', text: '已通过(已抢光)', icon: <Power size={14} /> },
                };
                const current = config[status] || config.draft;
                return (
                    <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${current.color}`}>
                        {current.icon}
                        {current.text}
                    </span>
                );
            };

            const getScenarioLabel = (val) => SCENARIOS.find(s => s.value === val)?.label || val;

            // 弹窗视图判断逻辑
            const isViewOnly = modalMode === 'view';
            const isApprovedEdit = modalMode === 'edit' && formData.status === 'approved';

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-10">
                    {/* 顶部导航 */}
                    <header className="bg-white shadow-sm border-b border-gray-200">
                        <div className="w-full max-w-[98%] mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg">
                                    <FileText className="text-white w-5 h-5" />
                                </div>
                                <h1 className="text-xl font-bold text-gray-900">优惠券批次管理系统</h1>
                            </div>
                            <button 
                                onClick={() => openModal('create')}
                                className="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                            >
                                <Plus className="w-4 h-4 mr-2" />
                                新建批次
                            </button>
                        </div>
                    </header>

                    {/* 主体内容 */}
                    <main className="w-full max-w-[98%] mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        
                        {/* 数据统计卡片 */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                                <div className="text-sm text-gray-500">总批次</div>
                                <div className="text-2xl font-bold">{coupons.length}</div>
                            </div>
                            <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                                <div className="text-sm text-gray-500">运行中活动</div>
                                <div className="text-2xl font-bold text-green-600">
                                    {coupons.filter(c => getEffectiveStatus(c) === 'approved').length}
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                                <div className="text-sm text-gray-500">待审核 (含新建/改库存)</div>
                                <div className="text-2xl font-bold text-yellow-600">
                                    {coupons.filter(c => c.status === 'auditing' || c.pendingStock !== null).length}
                                </div>
                            </div>
                        </div>

                        {/* 列表与工具栏区域 */}

                            {/* 搜索与筛选工具栏 */}

                                <div className="flex items-center gap-4 flex-1">
                                    {/* 搜索框 */}
                                    <div className="relative max-w-xs w-full">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <SearchIcon className="text-gray-400" size={16} />
                                        </div>
                                        <input
                                            type="text"
                                            className="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                            placeholder="输入批次号或名称搜索..."
                                            value={searchText}
                                            onChange={e => setSearchText(e.target.value)}
                                        />
                                    </div>

                                    {/* 状态筛选 */}
                                    <select 
                                        className="block pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md"
                                        value={filterStatus}
                                        onChange={e => setFilterStatus(e.target.value)}
                                    >
                                        <option value="all">所有状态</option>
                                        <option value="draft">待提交</option>
                                        <option value="auditing">审核中</option>
                                        <option value="approved">已通过(运行中)</option>
                                        <option value="finished_auto">已通过(已抢光)</option>
                                        <option value="rejected">未通过</option>
                                        <option value="finished">已结束</option>
                                    </select>

                                    {/* 场景筛选 */}
                                    <select 
                                        className="block pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md"
                                        value={filterScenario}
                                        onChange={e => setFilterScenario(e.target.value)}
                                    >
                                        <option value="all">所有场景</option>
                                        {SCENARIOS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                                    </select>
                                </div>
                            </div>

                                <table className="min-w-full divide-y divide-gray-200">
                                    <thead className="bg-white">
                                        <tr>
