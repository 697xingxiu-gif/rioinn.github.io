                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">面额/门槛</th>
                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-48">库存情况</th>
                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">有效期/叠加</th>
                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作更新/操作人</th>
                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">审核时间/审核人</th>
                                            <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">审核备注</th>
                                            <th scope="col" className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider sticky right-0 bg-white z-10 shadow-[-1px_0_0_0_#e5e7eb]">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white divide-y divide-gray-200">
                                        {currentData.map((coupon) => {
                                            const remaining = coupon.totalQuantity - coupon.claimedQuantity;
                                            const isLowStock = remaining <= 50 && remaining > 0;
                                            const isSoldOut = remaining <= 0;
                                            const effStatus = getEffectiveStatus(coupon);
                                            
                                            return (
                                            <tr key={coupon.id} className="hover:bg-gray-50 transition-colors group">
                                                <td className="px-6 py-4">
                                                    <div className="flex flex-col items-start gap-1">
                                                        <div className="flex items-center text-xs text-gray-400 font-mono mb-0.5">
                                                            <Tag size={12} className="mr-1" />
                                                            批次号: {coupon.batchNo || '-'}
                                                        </div>
                                                        <span className="text-sm font-medium text-gray-900">{coupon.name}</span>
                                                        <span className="text-xs text-blue-700 bg-blue-50 border border-blue-200 px-2 py-1 rounded">
                                                            {getScenarioLabel(coupon.scenario)}
                                                        </span>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    <div className="inline-block border border-gray-200 rounded-md px-3 py-1.5 bg-white shadow-sm">
                                                        <div className="text-sm text-gray-900 font-bold text-center">¥{coupon.amount}</div>
                                                        <div className="text-xs text-gray-500 text-center mt-0.5 border-t border-gray-100 pt-0.5">
                                                            {coupon.ruleType === 'none' ? '无门槛' : `满 ¥${coupon.thresholdAmount}`}
                                                        </div>
                                                    </div>
                                                </td>
                                                {/* 库存列 */}
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    <div className="text-sm text-gray-900">
                                                        <span className="text-gray-500">总量: </span>{coupon.totalQuantity}
                                                    </div>
                                                    
                                                    {/* 待审核库存提示 */}
                                                    {coupon.pendingStock !== null && (
                                                        <div className="text-xs text-orange-600 bg-orange-50 border border-orange-200 px-2 py-1 rounded mt-1 flex items-center gap-1 w-fit">
                                                            <RefreshCw size={10} />
                                                            <span>库存审核中: {coupon.pendingStock}</span>
                                                        </div>
                                                    )}

                                                    {(effStatus === 'approved' || effStatus === 'finished_auto' || effStatus === 'finished') && (
                                                        <div className="text-xs mt-1 space-y-0.5">
                                                            <div className="text-gray-500">已领: {coupon.claimedQuantity}</div>
                                                            <div className={`font-medium flex items-center gap-1 ${isLowStock ? 'text-red-600 font-bold' : (isSoldOut ? 'text-gray-400' : 'text-gray-500')}`}>
                                                                {isSoldOut ? (
                                                                    <span className="bg-gray-100 text-gray-500 px-1 rounded border border-gray-200">已抢光</span>
                                                                ) : (
                                                                    <>剩余: {remaining}</>
                                                                )}
                                                                {isLowStock && <AlertTriangle size={12} />}
                                                            </div>
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    <div className="text-sm text-gray-900">
                                                        {coupon.validityType === 'fixed' ? (
                                                            <div className="flex flex-col text-xs">
                                                                <span>{coupon.validityStartDate} 至</span>
                                                                <span>{coupon.validityEndDate}</span>
                                                            </div>
                                                        ) : (
                                                            <span>{coupon.validityDays}天有效</span>
                                                        )}
                                                    </div>
                                                    <div className="text-xs text-gray-500 mt-1">
                                                        {coupon.stackable ? '可叠加' : '不可叠加'}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    {getStatusBadge(coupon)}
                                                </td>
                                                {/* 操作更新/操作人 */}
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    <div className="text-sm text-gray-900">{new Date(coupon.updateTime).toLocaleString()}</div>
                                                    <div className="text-xs text-gray-500">{coupon.operator}</div>
                                                </td>
                                                {/* 审核时间/审核人 */}
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    {coupon.auditTime ? (
                                                        <>
                                                            <div className="text-sm text-gray-900">{new Date(coupon.auditTime).toLocaleString()}</div>
                                                            <div className="text-xs text-gray-500">{coupon.auditor}</div>
                                                        </>
                                                    ) : (
                                                        <span className="text-gray-400 text-xs">-</span>
                                                    )}
                                                </td>
                                                {/* 审核备注 */}
                                                <td className="px-6 py-4">
                                                    {coupon.auditRemark ? (
                                                        <div className="text-xs text-gray-600 max-w-[150px] truncate" title={coupon.auditRemark}>
                                                            {coupon.auditRemark}
                                                        </div>
                                                    ) : (
                                                        <span className="text-gray-400 text-xs">-</span>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium sticky right-0 bg-white group-hover:bg-gray-50 transition-colors z-10 shadow-[-1px_0_0_0_#e5e7eb]">
                                                    <div className="flex justify-end gap-2 items-center flex-wrap max-w-[160px]">
                                                        
                                                        {/* 查看详情按钮 (始终可见) */}
                                                        <button 
                                                            onClick={() => openModal('view', coupon)} 
                                                            className="text-gray-600 hover:bg-gray-100 border border-gray-200 px-2.5 py-1 rounded text-xs transition-colors flex items-center gap-1"
                                                            title="查看详情"
                                                        >
                                                            <Eye size={12} /> 查看
                                                        </button>

                                                        {/* 编辑按钮 */}
                                                        {(coupon.status === 'draft' || coupon.status === 'rejected' || coupon.status === 'approved') && (
                                                            <button 
                                                                onClick={() => openModal('edit', coupon)} 
                                                                className="text-indigo-600 hover:bg-indigo-50 border border-indigo-200 px-2.5 py-1 rounded text-xs transition-colors"
                                                            >
                                                                编辑
                                                            </button>
                                                        )}
                                                        
                                                        {/* 提交按钮：仅Draft */}
                                                        {coupon.status === 'draft' && (
                                                            <button 
                                                                onClick={() => handleSubmitAudit(coupon.id)} 
                                                                className="text-blue-600 hover:bg-blue-50 border border-blue-200 px-2.5 py-1 rounded text-xs transition-colors"
                                                            >
                                                                提交
                                                            </button>
                                                        )}

                                                        {/* 撤回审核按钮：仅Auditing */}
                                                        {coupon.status === 'auditing' && (
                                                            <button 
                                                                onClick={() => handleRevokeAudit(coupon.id)} 
                                                                className="text-gray-600 hover:bg-gray-100 border border-gray-300 px-2.5 py-1 rounded text-xs transition-colors flex items-center gap-1"
                                                            >
                                                                <RotateCcw size={12} /> 撤回
                                                            </button>
                                                        )}

                                                        {/* 审核按钮：仅Auditing 或 有PendingStock */}
                                                        {(coupon.status === 'auditing' || coupon.pendingStock !== null) && (
                                                            <button 
                                                                onClick={() => openAuditModal(coupon)} 
                                                                className="text-orange-600 hover:bg-orange-50 border border-orange-200 px-2.5 py-1 rounded text-xs transition-colors font-bold"
                                                            >
                                                                {coupon.pendingStock !== null ? '审库存' : '审核'}
                                                            </button>
                                                        )}

                                                        {/* 结束活动：仅Approved */}
                                                        {coupon.status === 'approved' && (
                                                            <button 
                                                                onClick={() => handleFinish(coupon.id)} 
                                                                className="text-red-600 hover:bg-red-50 border border-red-200 px-2.5 py-1 rounded text-xs transition-colors"
                                                            >
                                                                结束
                                                            </button>
                                                        )}

                                                        {/* 删除：仅Draft或Rejected */}
                                                        {(['draft', 'rejected'].includes(coupon.status)) && (
                                                            <button onClick={() => handleDelete(coupon.id)} className="text-gray-400 hover:text-red-600 hover:bg-red-50 p-1 rounded transition-colors" title="删除草稿">
                                                                <Trash2 size={16} />
                                                            </button>
                                                        )}
                                                    </div>
                                                </td>
                                            </tr>
                                        )})}
                                        
                                        {/* 空数据处理 */}
                                        {currentData.length === 0 && (
                                            <tr>
                                                <td colSpan="9" className="px-6 py-10 text-center text-gray-500">
                                                    {filteredAndSortedCoupons.length === 0 && coupons.length > 0 ? '没有找到符合条件的批次。' : '暂无优惠券数据，请点击右上角新建。'}
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {/* 分页组件 */}
                            <div className="flex items-center justify-between px-6 py-3 border-t border-gray-200 bg-white">
                                <div className="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                                    <div>
                                        <p className="text-sm text-gray-700">
                                            显示第 <span className="font-medium text-blue-600">{filteredAndSortedCoupons.length === 0 ? 0 : (currentPage - 1) * pageSize + 1}</span> 到 <span className="font-medium text-blue-600">{Math.min(currentPage * pageSize, filteredAndSortedCoupons.length)}</span> 条结果，
                                            共 <span className="font-medium text-blue-600">{filteredAndSortedCoupons.length}</span> 条批次
                                        </p>
                                    </div>
                                    <div>
                                        <nav className="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                            <button
                                                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                                disabled={currentPage === 1}
                                                className={`relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium ${currentPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}`}
                                            >
                                                <span className="sr-only">上一页</span>
                                                <ChevronLeft size={16} />
                                            </button>
                                            
                                            <span className="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                                                {currentPage} / {totalPages}
                                            </span>

                                            <button
                                                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                                disabled={currentPage === totalPages || totalPages === 0}
                                                className={`relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium ${currentPage === totalPages || totalPages === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50'}`}
                                            >
                                                <span className="sr-only">下一页</span>
                                                <ChevronRight size={16} />
                                            </button>
                                        </nav>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </main>

                    {/* 新增/编辑/查看 模态框 */}
                    {modalMode && (
                        <div className="fixed inset-0 z-30 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
                            <div className="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                                <div className="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onClick={closeModal}></div>
                                <span className="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                                <div className="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                                    <form onSubmit={handleSave}>
                                        <div className="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                                            <div className="sm:flex sm:items-start">
                                                <div className="mt-3 text-center sm:mt-0 sm:text-left w-full">
                                                    <h3 className="text-lg leading-6 font-medium text-gray-900 mb-4 flex items-center gap-2" id="modal-title">
                                                        {isViewOnly && <><Eye size={18} className="text-gray-500"/> 查看批次详情</>}
                                                        {modalMode === 'edit' && !isApprovedEdit && <><Edit3 size={18} className="text-indigo-500"/> 编辑批次草稿</>}
                                                        {isApprovedEdit && <><Edit3 size={18} className="text-indigo-500"/> 调整库存（运行中）</>}
                                                        {modalMode === 'create' && <><Plus size={18} className="text-blue-500"/> 新建优惠券批次</>}
                                                    </h3>
                                                    
                                                    {/* 已通过时的编辑提示 */}
                                                    {isApprovedEdit && (
                                                        <div className="mb-4 p-3 bg-blue-50 text-blue-700 text-sm rounded border border-blue-100 flex items-start gap-2">
                                                            <div className="mt-0.5"><IconBase size={16}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></IconBase></div>
                                                            <div>
                                                                <p className="font-bold">修改说明</p>
                                                                <p>当前活动已通过审核，仅可修改库存数量。</p>
                                                                <p>修改后的库存需要再次审核，审核期间原活动正常进行。</p>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* 只读状态的提示 */}
                                                    {isViewOnly && (
                                                         <div className="mb-4 p-3 bg-gray-50 text-gray-500 text-sm rounded border border-gray-200">
                                                            当前为只读模式，不可修改数据。
                                                         </div>
                                                    )}

                                                    <div className="grid gap-4">
                                                        {/* 批次号（仅编辑或查看且已存在时显示） */}
                                                        {formData.batchNo && (
                                                            <div>
                                                                <label className="block text-sm font-medium text-gray-700">批次号</label>
                                                                <input 
                                                                    type="text" 
                                                                    disabled
                                                                    className="mt-1 block w-full border border-gray-200 rounded-md shadow-sm py-2 px-3 sm:text-sm bg-gray-50 text-gray-500 font-mono"
                                                                    value={formData.batchNo}
                                                                />
                                                            </div>
                                                        )}

                                                        {/* 批次名称 */}
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700">批次名称</label>
                                                            <input 
                                                                required
                                                                type="text" 
                                                                disabled={isViewOnly || isApprovedEdit}
                                                                className={`mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'focus:ring-blue-500 focus:border-blue-500'}`}
                                                                value={formData.name}
                                                                onChange={e => setFormData({...formData, name: e.target.value})}
                                                                placeholder="如：双11大促通用券"
                                                            />
                                                        </div>

                                                        {/* 库存设置 */}
                                                        <div className={isApprovedEdit ? "p-3 bg-yellow-50 border border-yellow-200 rounded-md" : ""}>
                                                            <div className="flex justify-between items-end">
                                                                <label className="block text-sm font-medium text-gray-700">
                                                                    发放总量 (张)
                                                                    {isApprovedEdit && <span className="ml-2 text-xs text-yellow-600 font-bold">* 仅能增加，需审核</span>}
                                                                </label>
                                                                {/* 撤销库存修改申请按钮 */}
                                                                {isApprovedEdit && formData.pendingStock !== null && (
                                                                    <button 
                                                                        type="button"
                                                                        onClick={handleRevokeStock}
                                                                        className="text-xs text-red-600 hover:text-red-800 underline decoration-red-300"
                                                                    >
                                                                        撤销待审库存
                                                                    </button>
                                                                )}
                                                            </div>
                                                            <div className="mt-1 relative">
                                                                <input 
                                                                    required
                                                                    type="number" 
                                                                    min="1"
                                                                    disabled={isViewOnly}
                                                                    className={`block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm ${isViewOnly ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'focus:ring-blue-500 focus:border-blue-500'}`}
                                                                    value={formData.totalQuantity}
                                                                    onChange={e => setFormData({...formData, totalQuantity: Number(e.target.value)})}
                                                                    placeholder="例如: 1000"
                                                                />
                                                                {isViewOnly && formData.pendingStock !== null && (
                                                                     <div className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-orange-600">
                                                                        有待审核总量: {formData.pendingStock}
                                                                     </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                        {/* 金额设置 */}
                                                        <div className={`border border-gray-200 rounded-md p-3 ${(isViewOnly || isApprovedEdit) ? 'bg-gray-50' : 'bg-white'}`}>
                                                            <label className="block text-sm font-medium text-gray-700">面额 (元)</label>
                                                            <div className="mt-1 relative rounded-md shadow-sm">
                                                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                                    <span className="text-gray-500 sm:text-sm">¥</span>
                                                                </div>
                                                                <input
                                                                    required
                                                                    type="number"
                                                                    min="0"
                                                                    disabled={isViewOnly || isApprovedEdit}
                                                                    className={`block w-full pl-7 pr-12 sm:text-sm border-gray-300 rounded-md py-2 ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:ring-blue-500 focus:border-blue-500'}`}
                                                                    value={formData.amount}
                                                                    onChange={e => setFormData({...formData, amount: Number(e.target.value)})}
                                                                />
                                                            </div>
                                                        </div>

                                                        {/* 场景 */}
                                                        <div className={`border border-gray-200 rounded-md p-3 ${(isViewOnly || isApprovedEdit) ? 'bg-gray-50' : 'bg-white'}`}>
                                                            <label className="block text-sm font-medium text-gray-700">应用场景</label>
                                                            <select
                                                                disabled={isViewOnly || isApprovedEdit}
                                                                className={`mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 sm:text-sm rounded-md ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:ring-blue-500 focus:border-blue-500'}`}
                                                                value={formData.scenario}
                                                                onChange={e => setFormData({...formData, scenario: e.target.value})}
                                                            >
                                                                {SCENARIOS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                                                            </select>
                                                        </div>

                                                        {/* 有效期设置 */}
                                                        <div className={`border border-gray-200 rounded-md p-3 ${(isViewOnly || isApprovedEdit) ? 'bg-gray-50' : 'bg-white'}`}>
                                                            <label className="block text-sm font-medium text-gray-700 mb-2">有效期设置</label>
                                                            
                                                            <div className="flex gap-4 mb-3">
                                                                <label className={`inline-flex items-center ${(isViewOnly || isApprovedEdit) ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                                    <input 
                                                                        type="radio" 
                                                                        disabled={isViewOnly || isApprovedEdit}
                                                                        className="form-radio text-blue-600 disabled:text-gray-400"
                                                                        name="validityType"
                                                                        checked={formData.validityType === 'relative'}
                                                                        onChange={() => setFormData({...formData, validityType: 'relative'})}
                                                                    />
                                                                    <span className={`ml-2 text-sm ${(isViewOnly || isApprovedEdit) ? 'text-gray-400' : 'text-gray-700'}`}>领取后生效 (天数)</span>
                                                                </label>
                                                                <label className={`inline-flex items-center ${(isViewOnly || isApprovedEdit) ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                                    <input 
                                                                        type="radio" 
                                                                        disabled={isViewOnly || isApprovedEdit}
                                                                        className="form-radio text-blue-600 disabled:text-gray-400"
                                                                        name="validityType"
                                                                        checked={formData.validityType === 'fixed'}
                                                                        onChange={() => setFormData({...formData, validityType: 'fixed'})}
                                                                    />
                                                                    <span className={`ml-2 text-sm ${(isViewOnly || isApprovedEdit) ? 'text-gray-400' : 'text-gray-700'}`}>固定时间段</span>
                                                                </label>
                                                            </div>

                                                            {formData.validityType === 'relative' ? (
                                                                <div>
                                                                     <input 
                                                                        required
                                                                        type="number" 
                                                                        min="1"
                                                                        disabled={isViewOnly || isApprovedEdit}
                                                                        className={`block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:ring-blue-500 focus:border-blue-500'}`}
                                                                        value={formData.validityDays}
                                                                        onChange={e => setFormData({...formData, validityDays: Number(e.target.value)})}
                                                                        placeholder="例如: 7"
                                                                     />
                                                                     <p className="mt-1 text-xs text-gray-500">
                                                                        用户领取当日起生效，至第N天23:59失效
                                                                     </p>
                                                                </div>
                                                            ) : (
                                                                <div>
                                                                    <div className="flex items-center gap-2">
                                                                        <input 
                                                                            type="date" 
                                                                            required
                                                                            disabled={isViewOnly || isApprovedEdit}
                                                                            className={`block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:ring-blue-500 focus:border-blue-500'}`}
                                                                            value={formData.validityStartDate}
                                                                            onChange={e => setFormData({...formData, validityStartDate: e.target.value})}
                                                                        />
                                                                        <span className="text-gray-500">至</span>
                                                                        <input 
                                                                            type="date" 
                                                                            required
                                                                            disabled={isViewOnly || isApprovedEdit}
                                                                            className={`block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:ring-blue-500 focus:border-blue-500'}`}
                                                                            value={formData.validityEndDate}
                                                                            onChange={e => setFormData({...formData, validityEndDate: e.target.value})}
                                                                        />
                                                                    </div>
                                                                    <p className="mt-1 text-xs text-gray-500">
                                                                        无论何时领取，有效期均在指定时间段内，过期不可用
                                                                    </p>
                                                                </div>
                                                            )}
                                                        </div>

                                                        {/* 叠加规则 */}
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">叠加规则</label>
                                                            <div className="flex gap-4">
                                                                <label className={`inline-flex items-center ${(isViewOnly || isApprovedEdit) ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                                    <input 
                                                                        type="radio" 
                                                                        disabled={isViewOnly || isApprovedEdit}
                                                                        className="form-radio text-blue-600 disabled:text-gray-400"
                                                                        name="stackable"
                                                                        checked={formData.stackable === true}
                                                                        onChange={() => setFormData({...formData, stackable: true})}
                                                                    />
                                                                    <span className={`ml-2 text-sm ${(isViewOnly || isApprovedEdit) ? 'text-gray-400' : 'text-gray-700'}`}>可叠加</span>
                                                                </label>
                                                                <label className={`inline-flex items-center ${(isViewOnly || isApprovedEdit) ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                                    <input 
                                                                        type="radio" 
                                                                        disabled={isViewOnly || isApprovedEdit}
                                                                        className="form-radio text-blue-600 disabled:text-gray-400"
                                                                        name="stackable"
                                                                        checked={formData.stackable === false}
                                                                        onChange={() => setFormData({...formData, stackable: false})}
                                                                    />
                                                                    <span className={`ml-2 text-sm ${(isViewOnly || isApprovedEdit) ? 'text-gray-400' : 'text-gray-700'}`}>不可叠加</span>
                                                                </label>
                                                            </div>
                                                        </div>

                                                        {/* 使用规则 */}
                                                        <div>
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">使用门槛</label>
                                                            <div className="space-y-2">
                                                                <div className="flex gap-4">
                                                                    <label className={`inline-flex items-center ${(isViewOnly || isApprovedEdit) ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                                        <input 
                                                                            type="radio" 
                                                                            disabled={isViewOnly || isApprovedEdit}
                                                                            className="form-radio text-blue-600 disabled:text-gray-400"
                                                                            name="ruleType"
                                                                            checked={formData.ruleType === 'none'}
                                                                            onChange={() => setFormData({...formData, ruleType: 'none', thresholdAmount: 0})}
                                                                        />
                                                                        <span className={`ml-2 text-sm ${(isViewOnly || isApprovedEdit) ? 'text-gray-400' : 'text-gray-700'}`}>无门槛</span>
                                                                    </label>
                                                                    <label className={`inline-flex items-center ${(isViewOnly || isApprovedEdit) ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                                        <input 
                                                                            type="radio" 
                                                                            disabled={isViewOnly || isApprovedEdit}
                                                                            className="form-radio text-blue-600 disabled:text-gray-400"
                                                                            name="ruleType"
                                                                            checked={formData.ruleType === 'threshold'}
                                                                            onChange={() => setFormData({...formData, ruleType: 'threshold'})}
                                                                        />
                                                                        <span className={`ml-2 text-sm ${(isViewOnly || isApprovedEdit) ? 'text-gray-400' : 'text-gray-700'}`}>满减</span>
                                                                    </label>
                                                                </div>
                                                                
                                                                {formData.ruleType === 'threshold' && (
                                                                    <div className="relative rounded-md shadow-sm w-1/2">
                                                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                                            <span className="text-gray-500 sm:text-xs">满¥</span>
                                                                        </div>
                                                                        <input
                                                                            required
                                                                            type="number"
                                                                            min="0.01"
                                                                            step="0.01"
                                                                            disabled={isViewOnly || isApprovedEdit}
                                                                            placeholder="门槛金额"
                                                                            className={`focus:ring-blue-500 focus:border-blue-500 block w-full pl-8 sm:text-sm border-gray-300 rounded-md py-1.5 ${(isViewOnly || isApprovedEdit) ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : ''}`}
                                                                            value={formData.thresholdAmount}
                                                                            onChange={e => setFormData({...formData, thresholdAmount: Number(e.target.value)})}
                                                                        />
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                                            {!isViewOnly && (
                                                <button type="submit" className="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm">
                                                    保存
                                                </button>
                                            )}
                                            <button type="button" onClick={closeModal} className={`mt-3 w-full inline-flex justify-center rounded-md border shadow-sm px-4 py-2 bg-white text-base font-medium hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm ${isViewOnly ? 'border-blue-500 text-blue-700 hover:bg-blue-50' : 'border-gray-300 text-gray-700'}`}>
                                                {isViewOnly ? '关闭详情' : '取消'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 审核 模态框 */}
                    {isAuditModalOpen && (
                        <div className="fixed inset-0 z-20 overflow-y-auto">
                            <div className="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
                                <div className="fixed inset-0 bg-gray-500 bg-opacity-75" onClick={() => setIsAuditModalOpen(false)}></div>
                                <div className="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md w-full">
                                    <div className="bg-white px-4 pt-5 pb-4 sm:p-6">
                                        <h3 className="text-lg font-medium text-gray-900 mb-4">审核操作</h3>
                                        
                                        {/* 如果是库存审核，显示详细对比 */}
                                        {coupons.find(c => c.id === auditData.id)?.pendingStock !== null && (
                                            <div className="mb-4 bg-orange-50 p-3 rounded border border-orange-100 text-sm">
                                                <p className="font-bold text-orange-800 mb-1">库存变更申请</p>
                                                <div className="flex justify-between items-center text-gray-600">
                                                    <span>当前总量: <span className="font-mono font-bold">{coupons.find(c => c.id === auditData.id)?.totalQuantity}</span></span>
                                                    <span>→</span>
                                                    <span>申请总量: <span className="font-mono font-bold text-blue-600">{coupons.find(c => c.id === auditData.id)?.pendingStock}</span></span>
                                                </div>
                                            </div>
                                        )}

                                        <div className="mb-4">
                                            <span className="block text-sm font-medium text-gray-700 mb-2">审核结果</span>
                                            <div className="flex gap-4">
                                                <button 
                                                    onClick={() => setAuditData({...auditData, passed: true})}
                                                    className={`flex-1 py-2 rounded-md border text-sm font-medium ${auditData.passed ? 'bg-green-50 border-green-500 text-green-700' : 'bg-white border-gray-300 text-gray-700'}`}
                                                >
                                                    通过
                                                </button>
                                                <button 
                                                    onClick={() => setAuditData({...auditData, passed: false})}
                                                    className={`flex-1 py-2 rounded-md border text-sm font-medium ${!auditData.passed ? 'bg-red-50 border-red-500 text-red-700' : 'bg-white border-gray-300 text-gray-700'}`}
                                                >
                                                    拒绝
                                                </button>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                审核备注 { !auditData.passed && <span className="text-red-500">*</span> }
                                            </label>
                                            <textarea
                                                rows="3"
                                                className="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border"
                                                placeholder={auditData.passed ? "选填，通过备注" : "必填，请填写拒绝原因"}
                                                value={auditData.remark}
                                                onChange={e => setAuditData({...auditData, remark: e.target.value})}
                                            />
                                        </div>
                                    </div>
                                    <div className="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                                        <button 
                                            onClick={handleAuditAction}
                                            disabled={!auditData.passed && !auditData.remark.trim()}
                                            className={`w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 text-base font-medium text-white sm:ml-3 sm:w-auto sm:text-sm ${(!auditData.passed && !auditData.remark.trim()) ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                        >
                                            确认提交
                                        </button>
                                        <button onClick={() => setIsAuditModalOpen(false)} className="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                                            取消
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
